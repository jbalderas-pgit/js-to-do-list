    <main>
      <section id="enterTask" class="enter-task-section">

            <label for="task">Enter task here: </label>
            <input type="text" name="" id="newTask">

        </div>

      <section id="viewTask" class="view-task-section">
        <div class="group">
          <p>Current Tasks: </p>
        </div>
      </section>
    </main>
